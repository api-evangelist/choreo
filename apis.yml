      - type: JSONSchema
        url: json-schema/choreo-deployment.json
      - type: JSONSchema
        url: json-schema/choreo-environment.json
  - aid: choreo:developer-portal
    name: Choreo Developer Portal API
    description: >-
      The Choreo Developer Portal API enables API consumers to discover,
      evaluate, subscribe to, and consume APIs hosted on the Choreo platform.
      It provides access to the API marketplace, application management,
      subscription management, and credential generation for OAuth 2.0 and
      API key based authentication.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://devportal.choreo.dev/
    tags:
      - API Keys
      - API Marketplace
      - Applications
      - Developer Portal
      - OAuth
      - Subscriptions
    properties:
      - type: Documentation
        url: https://wso2.com/choreo/docs/consuming-services/manage-subscription/
      - type: OpenAPI
        url: openapi/choreo-developer-portal-openapi.yml
      - type: JSONSchema
        url: json-schema/choreo-application.json
      - type: JSONSchema
        url: json-schema/choreo-subscription.json
  - aid: choreo:insights
    name: Choreo Insights API
    description: >-
      The Choreo Insights API provides access to observability, monitoring,
      and analytics data for APIs and components deployed on the Choreo
      platform. It enables users to programmatically retrieve usage statistics,
      latency metrics, error analytics, and operational insights.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://wso2.com/choreo/docs/monitoring-and-insights/work-with-choreo-insights-api/access-the-choreo-insights-api/
    tags:
