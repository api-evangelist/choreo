aid: choreo
name: Choreo
x-type: company
description: >-
  WSO2 Choreo is an enterprise-grade Internal Developer Platform (IDP) and
  application orchestration platform that helps organizations build, deploy,
  manage, and observe APIs, microservices, integrations, and AI applications
  across multi-cloud Kubernetes infrastructure (AWS, Azure, GCP, Vultr, or
  upstream Kubernetes). Choreo combines API management, CI/CD, GitOps,
  observability, FinOps, and platform engineering into a single AI-guided
  experience. Developers connect Git repos and deploy instantly, while
  platform teams use Choreo to enforce security, governance, and compliance
  with PCI DSS and SOC 2 Type 2 certifications. The platform orchestrates
  CNCF tools including Kubernetes, Argo CD, Cilium, Envoy, Helm, Prometheus,
  OpenSearch, Flux, and KEDA, and exposes APIs for API management,
  developer portal/marketplace consumption, and observability insights.
