apis:
  - aid: choreo:api-management
    name: Choreo API Management API
    description: >-
      The Choreo API Management API provides programmatic access to manage
      the full lifecycle of APIs on the WSO2 Choreo platform. It allows
      API creators to create, publish, version, and manage APIs, manage
      organizations, projects, components, builds, and deployments.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://wso2.com/choreo/docs/
    tags:
      - API Management
      - Builds
      - Components
      - Deployments
      - Lifecycle
      - Organizations
      - Projects
    properties:
      - type: Documentation
        url: https://wso2.com/choreo/docs/
      - type: OpenAPI
        url: openapi/choreo-api-management-openapi.yml
      - type: JSONSchema
        url: json-schema/choreo-organization.json
