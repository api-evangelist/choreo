aid: choreo
url: >-
  https://raw.githubusercontent.com/api-evangelist/choreo/refs/heads/main/apis.yml
apis:
  - aid: choreo:api-management
    name: Choreo API Management API
    tags:
      - API Management
      - Lifecycle
      - Organizations
      - Projects
      - Components
      - Builds
      - Deployments
    humanURL: https://wso2.com/choreo/docs/
    properties:
      - url: https://wso2.com/choreo/docs/
        type: Documentation
      - url: openapi/choreo-api-management-openapi.yml
        type: OpenAPI
      - url: json-schema/choreo-organization.json
        type: JSONSchema
      - url: json-schema/choreo-project.json
        type: JSONSchema
      - url: json-schema/choreo-component.json
        type: JSONSchema
      - url: json-schema/choreo-api.json
        type: JSONSchema
      - url: json-schema/choreo-build.json
        type: JSONSchema
      - url: json-schema/choreo-deployment.json
        type: JSONSchema
      - url: json-schema/choreo-environment.json
        type: JSONSchema
    description: >-
      The Choreo API Management API provides programmatic access to manage
      the full lifecycle of APIs on the WSO2 Choreo platform. It allows
      API creators to create, publish, version, and manage APIs, manage
      organizations, projects, components, builds, and deployments.
  - aid: choreo:developer-portal
    name: Choreo Developer Portal API
    tags:
      - Developer Portal
      - API Marketplace
      - Subscriptions
      - Applications
      - OAuth
      - API Keys
    humanURL: https://devportal.choreo.dev/
    properties:
      - url: https://wso2.com/choreo/docs/consuming-services/manage-subscription/
        type: Documentation
      - url: openapi/choreo-developer-portal-openapi.yml
        type: OpenAPI
      - url: json-schema/choreo-application.json
        type: JSONSchema
      - url: json-schema/choreo-subscription.json
        type: JSONSchema
    description: >-
      The Choreo Developer Portal API enables API consumers to discover,
      evaluate, subscribe to, and consume APIs hosted on the Choreo platform.
      It provides access to the API marketplace, application management,
      subscription management, and credential generation for OAuth 2.0 and
      API key based authentication.
  - aid: choreo:insights
    name: Choreo Insights API
    tags:
      - Analytics
      - Monitoring
      - Observability
      - Logs
      - Alerts
      - Metrics
    humanURL: https://wso2.com/choreo/docs/monitoring-and-insights/work-with-choreo-insights-api/access-the-choreo-insights-api/
    properties:
      - url: https://wso2.com/choreo/docs/monitoring-and-insights/work-with-choreo-insights-api/access-the-choreo-insights-api/
        type: Documentation
      - url: openapi/choreo-insights-openapi.yml
        type: OpenAPI
    description: >-
      The Choreo Insights API provides access to observability, monitoring,
      and analytics data for APIs and components deployed on the Choreo
      platform. It enables users to programmatically retrieve usage statistics,
      latency metrics, error analytics, and operational insights.
