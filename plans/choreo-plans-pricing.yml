specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Choreo
providerId: choreo
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Management
  - Cloud Native
  - Internal Developer Platform
  - Kubernetes
  - Platform Engineering
  - WSO2
description: Choreo (WSO2) is a tiered Internal Developer Platform with Developer (free), Team (per-component
  subscription), and Enterprise (custom) plans. The Developer and Team tiers include fixed per-month
  build, deployment, request, log-volume, and infrastructure quotas; Enterprise is custom-priced and
  passes infrastructure costs through. Free credits are available on Developer and during the first
  six months of Team for users who sign up with a business email.
sources:
  - https://wso2.com/choreo/pricing/
plans:
  - id: choreo-developer
    name: Developer
    type: freemium
    description: Free entry tier — first five components free, with $100/month resource credits and
      caps on builds, deployments, requests, and infrastructure.
    entries:
      - label: Components
        name: components
        type: quota
        metric: component
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Monthly resource credit
        name: resource_credit
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$100 included credits'
        userMultiplied: false
      - label: Builds
        name: builds
        type: quota
        metric: build
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Deployments
        name: deployments
        type: quota
        metric: deployment
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: API requests
        name: api_requests
        type: quota
        metric: request
        limit: 2000000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Logs
        name: logs
        type: quota
        metric: MB
        limit: 50
        timeFrame: day
        geo: global
        unit: 1
        price: 7-day retention
        userMultiplied: false
      - label: Infrastructure quota
        name: infra_quota
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '5 vCPU / 16 GB RAM / 100 GB storage / 100 GB network'
        userMultiplied: false
    elements:
      - name: First 5 components free
      - name: Public Choreo data plane
      - name: Community support
      - name: Configurable alerts (25)
      - name: API tests (100)
  - id: choreo-team
    name: Team
    type: subscription
    description: Per-component subscription for production workloads. Higher build, deployment, and
      request quotas; longer log retention; pass-through infrastructure once free credits are exhausted.
    entries:
      - label: Per component
        name: component_subscription
        type: subscription
        metric: component
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$150/component/month'
        userMultiplied: false
      - label: Six-month onboarding credit (business email)
        name: onboarding_credit
        type: flat
        metric: usage
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: '5 components free for 6 months + $1,000 in credits'
        userMultiplied: false
      - label: Builds
        name: builds
        type: quota
        metric: build
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Deployments
        name: deployments
        type: quota
        metric: deployment
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: API requests
        name: api_requests
        type: quota
        metric: request
        limit: 5000000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Logs
        name: logs
        type: quota
        metric: MB
        limit: 500
        timeFrame: day
        geo: global
        unit: 1
        price: 30-day retention
        userMultiplied: false
      - label: Infrastructure quota
        name: infra_quota
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '25 vCPU / 128 GB RAM / 500 GB storage / 500 GB network'
        userMultiplied: false
    elements:
      - name: Unlimited developers, projects, and deployment tracks
      - name: API tests (500)
      - name: Configurable alerts (100)
      - name: Standard support
  - id: choreo-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced plan with unlimited builds, deployments, and API requests, pass-through
      infrastructure billing, support for Private Data Planes, and annual-commitment discounts.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom — discounts based on annual commitments
        userMultiplied: false
      - label: Builds, deployments, requests
        name: usage
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: unlimited
        userMultiplied: false
      - label: Infrastructure
        name: infrastructure
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: pass-through
        userMultiplied: false
    elements:
      - name: Private Data Planes
      - name: Unlimited storage, logs, and alerts
      - name: Premium support and SLAs
      - name: Annual-commitment discounts
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
