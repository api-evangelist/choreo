specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Choreo
providerId: choreo
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Management
  - Cloud Native
  - Internal Developer Platform
  - Kubernetes
  - Platform Engineering
  - WSO2
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Choreo: tiered subscription (Developer / Team / Enterprise)
  combined with pass-through infrastructure billing once free credits are exhausted. Per-component
  Team pricing plus monthly resource credits creates a hybrid Subscription + Pay-As-You-Go shape on
  Team and Enterprise.'
sources:
  - https://wso2.com/choreo/pricing/
  - https://wso2.com/choreo/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: WSO2 LLC
serviceCategory: Internal Developer Platform
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Credit
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Choreo
  ServiceCategory: Internal Developer Platform
  ProviderName: WSO2
  PublisherName: WSO2 LLC
  InvoiceIssuerName: WSO2 LLC
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Subscription
meters:
  - name: component_subscription
    description: Number of components subscribed under the Team plan
    unit: component-month
    aggregation: sum
    dimensions:
      - project
      - organization
  - name: builds
    description: CI builds executed
    unit: build
    aggregation: sum
    dimensions:
      - project
      - component
  - name: deployments
    description: Deployments executed
    unit: deployment
    aggregation: sum
    dimensions:
      - project
      - environment
  - name: api_requests
    description: API requests served through Choreo gateways
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
      - subscription
  - name: log_volume
    description: Log MB ingested (per day, with retention by plan)
    unit: MB-day
    aggregation: sum
    dimensions:
      - component
      - environment
  - name: infrastructure
    description: vCPU, RAM, storage, and network consumed on the Choreo data plane (pass-through on
      Team and Enterprise)
    unit: varies
    aggregation: sum
    dimensions:
      - resource_type
      - environment
      - region
principles:
  - name: Visibility
    description: Use the Choreo console's Cost Insights and consumption dashboards to track resource
      credit burn-down, build / deployment counts, and request volumes per project.
  - name: Allocation
    description: Tag spend by Choreo project, environment, and team — the per-component Team pricing
      makes component ownership the natural showback boundary.
  - name: Optimization
    description: Right-size component CPU/RAM, scale to zero where possible, prune unused builds and
      old logs, and consolidate components before crossing the next per-component price step.
  - name: Accountability
    description: Platform team owns the Choreo subscription tier; product engineering owns per-component
      consumption; finance reconciles WSO2 invoices and the in-product credit ledger.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
