naftiko: 1.0.0-alpha2
info:
  label: Choreo Developer Portal API — Subscriptions
  description: 'Choreo Developer Portal API — Subscriptions. 3 operations. Lead operation: Choreo List subscriptions. Self-contained
    Naftiko capability covering one Choreo business surface.'
  tags:
  - Choreo
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHOREO_API_KEY: CHOREO_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-portal-subscriptions
    baseUri: https://devportal.choreo.dev/api/v1
    description: Choreo Developer Portal API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions
      path: /subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: Choreo List subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: query
          type: string
          description: Filter by application identifier.
        - name: apiId
          in: query
          type: string
          description: Filter by API identifier.
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createsubscription
        method: POST
        description: Choreo Subscribe to an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: subscriptions-subscriptionId
      path: /subscriptions/{subscriptionId}
      operations:
      - name: deletesubscription
        method: DELETE
        description: Choreo Unsubscribe from an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.CHOREO_API_KEY}}'
  exposes:
  - type: rest
    namespace: developer-portal-subscriptions-rest
    port: 8080
    description: REST adapter for Choreo Developer Portal API — Subscriptions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions
      name: subscriptions
      description: REST surface for subscriptions.
      operations:
      - method: GET
        name: listsubscriptions
        description: Choreo List subscriptions
        call: developer-portal-subscriptions.listsubscriptions
        with:
          applicationId: rest.applicationId
          apiId: rest.apiId
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsubscription
        description: Choreo Subscribe to an API
        call: developer-portal-subscriptions.createsubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{subscriptionid}
      name: subscriptions-subscriptionid
      description: REST surface for subscriptions-subscriptionId.
      operations:
      - method: DELETE
        name: deletesubscription
        description: Choreo Unsubscribe from an API
        call: developer-portal-subscriptions.deletesubscription
        with:
          subscriptionId: rest.subscriptionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-portal-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Choreo Developer Portal API — Subscriptions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: choreo-list-subscriptions
      description: Choreo List subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-portal-subscriptions.listsubscriptions
      with:
        applicationId: tools.applicationId
        apiId: tools.apiId
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-subscribe-api
      description: Choreo Subscribe to an API
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: developer-portal-subscriptions.createsubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-unsubscribe-api
      description: Choreo Unsubscribe from an API
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: developer-portal-subscriptions.deletesubscription
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
