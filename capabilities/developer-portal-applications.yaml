naftiko: 1.0.0-alpha2
info:
  label: Choreo Developer Portal API — Applications
  description: 'Choreo Developer Portal API — Applications. 5 operations. Lead operation: Choreo List applications. Self-contained
    Naftiko capability covering one Choreo business surface.'
  tags:
  - Choreo
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHOREO_API_KEY: CHOREO_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-portal-applications
    baseUri: https://devportal.choreo.dev/api/v1
    description: Choreo Developer Portal API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: Choreo List applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createapplication
        method: POST
        description: Choreo Create an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: applications-applicationId
      path: /applications/{applicationId}
      operations:
      - name: getapplication
        method: GET
        description: Choreo Get an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          required: true
      - name: updateapplication
        method: PUT
        description: Choreo Update an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapplication
        method: DELETE
        description: Choreo Delete an application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: applicationId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.CHOREO_API_KEY}}'
  exposes:
  - type: rest
    namespace: developer-portal-applications-rest
    port: 8080
    description: REST adapter for Choreo Developer Portal API — Applications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: listapplications
        description: Choreo List applications
        call: developer-portal-applications.listapplications
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplication
        description: Choreo Create an application
        call: developer-portal-applications.createapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{applicationid}
      name: applications-applicationid
      description: REST surface for applications-applicationId.
      operations:
      - method: GET
        name: getapplication
        description: Choreo Get an application
        call: developer-portal-applications.getapplication
        with:
          applicationId: rest.applicationId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapplication
        description: Choreo Update an application
        call: developer-portal-applications.updateapplication
        with:
          applicationId: rest.applicationId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapplication
        description: Choreo Delete an application
        call: developer-portal-applications.deleteapplication
        with:
          applicationId: rest.applicationId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-portal-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Choreo Developer Portal API — Applications. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: choreo-list-applications
      description: Choreo List applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-portal-applications.listapplications
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-create-application
      description: Choreo Create an application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: developer-portal-applications.createapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-get-application
      description: Choreo Get an application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-portal-applications.getapplication
      with:
        applicationId: tools.applicationId
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-update-application
      description: Choreo Update an application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: developer-portal-applications.updateapplication
      with:
        applicationId: tools.applicationId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-delete-application
      description: Choreo Delete an application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: developer-portal-applications.deleteapplication
      with:
        applicationId: tools.applicationId
      outputParameters:
      - type: object
        mapping: $.
