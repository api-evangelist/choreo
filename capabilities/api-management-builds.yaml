naftiko: 1.0.0-alpha2
info:
  label: Choreo API Management API — Builds
  description: 'Choreo API Management API — Builds. 2 operations. Lead operation: Choreo List builds. Self-contained Naftiko
    capability covering one Choreo business surface.'
  tags:
  - Choreo
  - Builds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHOREO_API_KEY: CHOREO_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-management-builds
    baseUri: https://console.choreo.dev/api/v1
    description: Choreo API Management API — Builds business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-projects-projectId-components-componentId-builds
      path: /organizations/{orgId}/projects/{projectId}/components/{componentId}/builds
      operations:
      - name: listbuilds
        method: GET
        description: Choreo List builds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        - name: componentId
          in: path
          type: string
          required: true
      - name: createbuild
        method: POST
        description: Choreo Trigger a build
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        - name: componentId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CHOREO_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-management-builds-rest
    port: 8080
    description: REST adapter for Choreo API Management API — Builds. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organizations/{orgid}/projects/{projectid}/components/{componentid}/builds
      name: organizations-orgid-projects-projectid-components-componentid-builds
      description: REST surface for organizations-orgId-projects-projectId-components-componentId-builds.
      operations:
      - method: GET
        name: listbuilds
        description: Choreo List builds
        call: api-management-builds.listbuilds
        with:
          orgId: rest.orgId
          projectId: rest.projectId
          componentId: rest.componentId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbuild
        description: Choreo Trigger a build
        call: api-management-builds.createbuild
        with:
          orgId: rest.orgId
          projectId: rest.projectId
          componentId: rest.componentId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-management-builds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Choreo API Management API — Builds. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: choreo-list-builds
      description: Choreo List builds
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management-builds.listbuilds
      with:
        orgId: tools.orgId
        projectId: tools.projectId
        componentId: tools.componentId
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-trigger-build
      description: Choreo Trigger a build
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-management-builds.createbuild
      with:
        orgId: tools.orgId
        projectId: tools.projectId
        componentId: tools.componentId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
