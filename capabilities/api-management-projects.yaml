naftiko: 1.0.0-alpha2
info:
  label: Choreo API Management API — Projects
  description: 'Choreo API Management API — Projects. 2 operations. Lead operation: Choreo List projects. Self-contained Naftiko
    capability covering one Choreo business surface.'
  tags:
  - Choreo
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHOREO_API_KEY: CHOREO_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-management-projects
    baseUri: https://console.choreo.dev/api/v1
    description: Choreo API Management API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-projects
      path: /organizations/{orgId}/projects
      operations:
      - name: listprojects
        method: GET
        description: Choreo List projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Organization identifier.
          required: true
      - name: createproject
        method: POST
        description: Choreo Create a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Organization identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CHOREO_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-management-projects-rest
    port: 8080
    description: REST adapter for Choreo API Management API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organizations/{orgid}/projects
      name: organizations-orgid-projects
      description: REST surface for organizations-orgId-projects.
      operations:
      - method: GET
        name: listprojects
        description: Choreo List projects
        call: api-management-projects.listprojects
        with:
          orgId: rest.orgId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Choreo Create a project
        call: api-management-projects.createproject
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-management-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Choreo API Management API — Projects. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: choreo-list-projects
      description: Choreo List projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management-projects.listprojects
      with:
        orgId: tools.orgId
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-create-project
      description: Choreo Create a project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-management-projects.createproject
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
