naftiko: 1.0.0-alpha2
info:
  label: Choreo API Management API — Components
  description: 'Choreo API Management API — Components. 4 operations. Lead operation: Choreo List components. Self-contained
    Naftiko capability covering one Choreo business surface.'
  tags:
  - Choreo
  - Components
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHOREO_API_KEY: CHOREO_API_KEY
capability:
  consumes:
  - type: http
    namespace: api-management-components
    baseUri: https://console.choreo.dev/api/v1
    description: Choreo API Management API — Components business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-projects-projectId-components
      path: /organizations/{orgId}/projects/{projectId}/components
      operations:
      - name: listcomponents
        method: GET
        description: Choreo List components
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Organization identifier.
          required: true
        - name: projectId
          in: path
          type: string
          description: Project identifier.
          required: true
      - name: createcomponent
        method: POST
        description: Choreo Create a component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Organization identifier.
          required: true
        - name: projectId
          in: path
          type: string
          description: Project identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-orgId-projects-projectId-components-componentId
      path: /organizations/{orgId}/projects/{projectId}/components/{componentId}
      operations:
      - name: getcomponent
        method: GET
        description: Choreo Get a component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        - name: componentId
          in: path
          type: string
          required: true
      - name: deletecomponent
        method: DELETE
        description: Choreo Delete a component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        - name: componentId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.CHOREO_API_KEY}}'
  exposes:
  - type: rest
    namespace: api-management-components-rest
    port: 8080
    description: REST adapter for Choreo API Management API — Components. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organizations/{orgid}/projects/{projectid}/components
      name: organizations-orgid-projects-projectid-components
      description: REST surface for organizations-orgId-projects-projectId-components.
      operations:
      - method: GET
        name: listcomponents
        description: Choreo List components
        call: api-management-components.listcomponents
        with:
          orgId: rest.orgId
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcomponent
        description: Choreo Create a component
        call: api-management-components.createcomponent
        with:
          orgId: rest.orgId
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{orgid}/projects/{projectid}/components/{componentid}
      name: organizations-orgid-projects-projectid-components-componentid
      description: REST surface for organizations-orgId-projects-projectId-components-componentId.
      operations:
      - method: GET
        name: getcomponent
        description: Choreo Get a component
        call: api-management-components.getcomponent
        with:
          orgId: rest.orgId
          projectId: rest.projectId
          componentId: rest.componentId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecomponent
        description: Choreo Delete a component
        call: api-management-components.deletecomponent
        with:
          orgId: rest.orgId
          projectId: rest.projectId
          componentId: rest.componentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-management-components-mcp
    port: 9090
    transport: http
    description: MCP adapter for Choreo API Management API — Components. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: choreo-list-components
      description: Choreo List components
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management-components.listcomponents
      with:
        orgId: tools.orgId
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-create-component
      description: Choreo Create a component
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: api-management-components.createcomponent
      with:
        orgId: tools.orgId
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-get-component
      description: Choreo Get a component
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management-components.getcomponent
      with:
        orgId: tools.orgId
        projectId: tools.projectId
        componentId: tools.componentId
      outputParameters:
      - type: object
        mapping: $.
    - name: choreo-delete-component
      description: Choreo Delete a component
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: api-management-components.deletecomponent
      with:
        orgId: tools.orgId
        projectId: tools.projectId
        componentId: tools.componentId
      outputParameters:
      - type: object
        mapping: $.
